server {
    listen 80;
    server_name localhost;

    root /var/www/html;
    index index.php index.html;

    # Ліміт розміру файлів (для медіа-завантажень)
    client_max_body_size 64M;

    # Логи
    access_log /var/log/nginx/landing_access.log;
    error_log  /var/log/nginx/landing_error.log;

    # WordPress — pretty permalinks
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # PHP через php-fpm
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass  wordpress:9000;
        fastcgi_index index.php;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Статичні файли — кешування
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # Заборонити доступ до .htaccess та прихованих файлів
    location ~ /\. {
        deny all;
    }

    # Заблокувати xmlrpc
    location = /xmlrpc.php {
        deny all;
    }
}
