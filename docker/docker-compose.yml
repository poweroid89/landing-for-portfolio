services:

  db:
    image: mysql:8.0
    container_name: landing_db
    restart: unless-stopped
    env_file:
      - ../.env
    volumes:
      - ./mysql:/var/lib/mysql
    networks:
      - landing_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  wordpress:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: landing_wp
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      WORDPRESS_TABLE_PREFIX: wp_
    volumes:
      - ../wordpress:/var/www/html
      - ../theme:/var/www/html/wp-content/themes/landing-for-portfolio
    networks:
      - landing_net

  nginx:
    image: nginx:1.25-alpine
    container_name: landing_nginx
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - ../wordpress:/var/www/html
      - ../theme:/var/www/html/wp-content/themes/landing-for-portfolio
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - wordpress
    networks:
      - landing_net

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: landing_pma
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - ../.env
    ports:
      - "8889:80"
    environment:
      PMA_HOST: db
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    networks:
      - landing_net

  redis:
    image: redis:alpine
    container_name: landing_redis
    restart: unless-stopped
    networks:
      - landing_net

  mailhog:
    image: mailhog/mailhog:latest
    container_name: landing_mailhog
    restart: unless-stopped
    ports:
      - "8026:8025"
    networks:
      - landing_net

networks:
  landing_net:
    driver: bridge
